<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MaMony — Adding...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #111; color: #fff;
    text-align: center; padding: 2rem;
  }
  .card { max-width: 320px; }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  .msg  { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
  .sub  { font-size: 0.85rem; color: #999; }
  .err  { color: #f43f5e; }
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">...</div>
  <div class="msg" id="msg">Saving transaction...</div>
  <div class="sub" id="sub"></div>
</div>
<script>
(async () => {
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(window.location.search);

  const FIREBASE_DB_URL = 'https://mamony-54963-default-rtdb.firebaseio.com';
  const syncKey = params.get('key') || localStorage.getItem('mamony_sync_key');

  const merchant = params.get('m') || params.get('merchant') || '';
  const amount   = parseFloat(params.get('a') || params.get('amount') || '0');
  const currency = (params.get('c') || params.get('currency') || 'USD').toUpperCase();

  if (!syncKey) {
    $('icon').textContent = '!';
    $('msg').textContent = 'No sync key found';
    $('msg').classList.add('err');
    $('sub').textContent = 'Open MaMony and set up Cloud Sync first.';
    return;
  }

  if (!merchant || !amount || amount <= 0) {
    $('icon').textContent = '!';
    $('msg').textContent = 'Missing data';
    $('msg').classList.add('err');
    $('sub').textContent = `merchant: "${merchant}", amount: ${amount}`;
    return;
  }

  const ts = params.get('ts') || Math.floor(Date.now() / 1000);

  try {
    const res = await fetch(`${FIREBASE_DB_URL}/mamony/${syncKey}/inbox.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ merchant, amount, currency, ts: Number(ts) }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    $('icon').textContent = '\u2705';
    $('msg').textContent = `${currency} ${amount}`;
    $('sub').textContent = merchant;
  } catch (e) {
    $('icon').textContent = '!';
    $('msg').textContent = 'Failed to save';
    $('msg').classList.add('err');
    $('sub').textContent = e.message;
  }
})();
</script>
</body>
</html>
